# DO NOT EDIT/UPDATE IN PRODUCTION BUT USE custom.conf TO OVERRIDE!

#################
# WIDGET ENGINE #
#################

widget_engine.defaultClassName = "PlotlyWidgetEngine"

widget_engine.providers = [
  {
    "name" : "Plotly",
    "className": "PlotlyWidgetEngine",
    "jsImports": [
      {"webjar": "plotly.js-dist", "path": "plotly.js"},

      // PDF export
      {"path": "jspdf.min.js"},
      {"path": "svg2pdf.min.js"},

      {"path": "plotly-widget-engine.js"}
    ]
  },

  // Highcharts 11.1.0 — NOT open-source. Free only for personal/non-commercial use.
  // Commercial use requires a paid license from Highsoft (https://www.highcharts.com/license).
  {
    "name" : "Highcharts",
    "className": "HighchartsWidgetEngine",
    "jsImports": [
      {"webjar": "highcharts", "path": "code/highcharts.js"},
      {"webjar": "highcharts", "path": "code/modules/exporting.js"},
      {"webjar": "highcharts", "path": "code/modules/heatmap.js"},
      {"webjar": "highcharts", "path": "code/highcharts-more.js"},

      // Boost
      {"webjar": "highcharts", "path": "code/modules/boost.js"},
      {"webjar": "highcharts", "path": "code/modules/boost-canvas.js"},

      // Bulk Export
      {"webjar": "highcharts", "path": "code/modules/offline-exporting.js"},
      {"webjar": "highcharts", "path": "code/lib/jspdf.js"},
      {"webjar": "highcharts", "path": "code/lib/svg2pdf.js"},

      {"path": "highcharts-widget-engine.js"}
    ]
  },

  {
    "name" : "ApexCharts",
    "className": "ApexChartsWidgetEngine",
    "jsImports": [
      {"webjar": "apexcharts", "path": "dist/apexcharts.min.js"},

      // PDF export
      {"path": "jspdf.min.js"},
      {"path": "svg2pdf.min.js"},

      {"path": "apexcharts-widget-engine.js"}
    ]
  },

  {
    "name" : "ECharts",
    "className": "EChartsWidgetEngine",
    "jsImports": [
      {"webjar": "echarts", "path": "dist/echarts.min.js"},

      // PDF export
      {"path": "jspdf.min.js"},
      {"path": "svg2pdf.min.js"},

      {"path": "echarts-widget-engine.js"}
    ]
  }
]